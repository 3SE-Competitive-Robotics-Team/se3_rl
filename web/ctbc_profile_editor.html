<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CTBC Profile Editor</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --ink: #20242a;
      --muted: #66717f;
      --line: #d8d2c7;
      --panel: #ffffff;
      --x: #2477a8;
      --z: #248b5a;
      --amp: #a9572a;
      --wheel: #7047a8;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button,
    .file-button {
      border: 1px solid #bfc7cc;
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      padding: 8px 11px;
      font: inherit;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      min-height: 34px;
    }

    button.primary {
      background: #1d5f7a;
      color: #fff;
      border-color: #1d5f7a;
    }

    input[type="file"] {
      display: none;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 14px;
      padding: 14px;
      min-height: 0;
    }

    .plots,
    .side {
      min-width: 0;
    }

    .plot {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .plot-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 11px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }

    .plot-head strong {
      font-size: 13px;
      letter-spacing: 0;
    }

    .plot-head span {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    canvas {
      display: block;
      width: 100%;
      height: 150px;
      touch-action: none;
      cursor: crosshair;
    }

    .side {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 12px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .panel h2 {
      margin: 0;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      letter-spacing: 0;
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px;
    }

    label {
      display: grid;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
    }

    input[type="number"] {
      width: 100%;
      border: 1px solid #bdc6cc;
      border-radius: 6px;
      padding: 8px;
      font: inherit;
      color: var(--ink);
      background: #fff;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    th,
    td {
      border-bottom: 1px solid #ebe6dd;
      padding: 6px;
      text-align: right;
      white-space: nowrap;
    }

    th:first-child,
    td:first-child {
      text-align: left;
    }

    td button {
      min-height: 26px;
      padding: 5px 7px;
      font-size: 12px;
    }

    .table-wrap {
      max-height: 230px;
      overflow: auto;
    }

    pre {
      margin: 0;
      padding: 12px;
      overflow: auto;
      min-height: 0;
      height: 100%;
      font-size: 12px;
      line-height: 1.45;
      background: #182027;
      color: #dbe8ef;
    }

    @media (max-width: 900px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .workspace {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>CTBC Profile Editor</h1>
      <div class="toolbar">
        <label class="file-button" for="importFile">Import</label>
        <input id="importFile" type="file" accept="application/json,.json" />
        <button id="copyBtn">Copy JSON</button>
        <button id="resetBtn">Reset</button>
        <button id="downloadBtn" class="primary">Download JSON</button>
      </div>
    </header>

    <section class="workspace">
      <div class="plots" id="plots"></div>

      <aside class="side">
        <section class="panel">
          <h2>Profile</h2>
          <div class="fields">
            <label>
              Period s
              <input id="periodInput" type="number" min="0.1" max="2" step="0.01" />
            </label>
            <label>
              Step s
              <input id="stepInput" type="number" min="0.01" max="0.2" step="0.01" value="0.02" />
            </label>
          </div>
        </section>

        <section class="panel">
          <h2>Points</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>t</th>
                  <th>x</th>
                  <th>z</th>
                  <th>amp</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="pointRows"></tbody>
            </table>
          </div>
        </section>

        <section class="panel">
          <h2>JSON</h2>
          <pre id="jsonOut"></pre>
        </section>
      </aside>
    </section>
  </main>

  <script>
    const channels = [
      { key: "x_m", label: "Wheel x", unit: "m", min: -0.16, max: 0.02, color: "#2477a8" },
      { key: "z_m", label: "Wheel z", unit: "m", min: -0.02, max: 0.20, color: "#248b5a" },
      { key: "amp", label: "Joint amp", unit: "scale", min: 0.0, max: 1.3, color: "#a9572a" },
      { key: "wheel_action", label: "Wheel action", unit: "action", min: -0.4, max: 0.4, color: "#7047a8" },
    ];

    const defaultPoints = [
      { t: 0.00, x_m: 0.00, z_m: 0.00, amp: 0.00, wheel_action: 0.00 },
      { t: 0.08, x_m: -0.09, z_m: 0.07, amp: 0.45, wheel_action: 0.00 },
      { t: 0.20, x_m: -0.13, z_m: 0.15, amp: 1.00, wheel_action: 0.00 },
      { t: 0.38, x_m: -0.11, z_m: 0.15, amp: 0.80, wheel_action: 0.00 },
      { t: 0.58, x_m: -0.03, z_m: 0.05, amp: 0.25, wheel_action: 0.00 },
      { t: 0.68, x_m: 0.00, z_m: 0.00, amp: 0.00, wheel_action: 0.00 },
    ];

    let state = {
      period_s: 0.68,
      points: defaultPoints.map((p) => ({ ...p })),
    };

    const plotRoot = document.getElementById("plots");
    const periodInput = document.getElementById("periodInput");
    const stepInput = document.getElementById("stepInput");
    const pointRows = document.getElementById("pointRows");
    const jsonOut = document.getElementById("jsonOut");
    const canvases = new Map();
    let drag = null;

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function round(v, places = 4) {
      const scale = 10 ** places;
      return Math.round(v * scale) / scale;
    }

    function sortPoints() {
      state.points.sort((a, b) => a.t - b.t);
      state.period_s = Math.max(0.1, round(state.period_s, 3));
      for (const p of state.points) {
        p.t = clamp(round(p.t, 4), 0, state.period_s);
      }
      state.points[0].t = 0;
      state.points[state.points.length - 1].t = state.period_s;
    }

    function profileJson() {
      sortPoints();
      return {
        version: 1,
        period_s: state.period_s,
        points: state.points.map((p) => ({
          t: round(p.t, 4),
          x_m: round(p.x_m, 4),
          z_m: round(p.z_m, 4),
          amp: round(p.amp, 4),
          wheel_action: round(p.wheel_action, 4),
        })),
      };
    }

    function valueToY(value, channel, height) {
      const pad = 18;
      const u = (value - channel.min) / (channel.max - channel.min);
      return height - pad - u * (height - 2 * pad);
    }

    function yToValue(y, channel, height) {
      const pad = 18;
      const u = (height - pad - y) / (height - 2 * pad);
      return clamp(channel.min + u * (channel.max - channel.min), channel.min, channel.max);
    }

    function timeToX(t, width) {
      const pad = 34;
      return pad + (t / state.period_s) * (width - 2 * pad);
    }

    function xToTime(x, width) {
      const pad = 34;
      return clamp(((x - pad) / (width - 2 * pad)) * state.period_s, 0, state.period_s);
    }

    function resizeCanvas(canvas) {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.round(rect.width * dpr));
      canvas.height = Math.max(1, Math.round(rect.height * dpr));
      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { width: rect.width, height: rect.height, ctx };
    }

    function drawPlot(channel) {
      const canvas = canvases.get(channel.key);
      const { width, height, ctx } = resizeCanvas(canvas);
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, width, height);

      ctx.strokeStyle = "#e5e0d7";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 6; i++) {
        const x = timeToX((state.period_s * i) / 6, width);
        ctx.beginPath();
        ctx.moveTo(x, 14);
        ctx.lineTo(x, height - 18);
        ctx.stroke();
      }
      for (let i = 0; i <= 4; i++) {
        const y = 18 + ((height - 36) * i) / 4;
        ctx.beginPath();
        ctx.moveTo(34, y);
        ctx.lineTo(width - 34, y);
        ctx.stroke();
      }

      ctx.strokeStyle = channel.color;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      state.points.forEach((p, i) => {
        const x = timeToX(p.t, width);
        const y = valueToY(p[channel.key], channel, height);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();

      for (let i = 0; i < state.points.length; i++) {
        const p = state.points[i];
        const x = timeToX(p.t, width);
        const y = valueToY(p[channel.key], channel, height);
        ctx.fillStyle = i === 0 || i === state.points.length - 1 ? "#ffffff" : channel.color;
        ctx.strokeStyle = channel.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }

      ctx.fillStyle = "#66717f";
      ctx.font = "11px ui-sans-serif, system-ui";
      ctx.textAlign = "left";
      ctx.fillText(`${channel.max} ${channel.unit}`, 8, 18);
      ctx.fillText(`${channel.min} ${channel.unit}`, 8, height - 8);
      ctx.textAlign = "right";
      ctx.fillText(`${state.period_s.toFixed(2)}s`, width - 8, height - 8);
    }

    function renderTable() {
      pointRows.innerHTML = "";
      state.points.forEach((p, idx) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${p.t.toFixed(2)}</td>
          <td>${p.x_m.toFixed(3)}</td>
          <td>${p.z_m.toFixed(3)}</td>
          <td>${p.amp.toFixed(2)}</td>
          <td><button data-index="${idx}">Del</button></td>
        `;
        row.querySelector("button").disabled = idx === 0 || idx === state.points.length - 1;
        row.querySelector("button").addEventListener("click", () => {
          state.points.splice(idx, 1);
          render();
        });
        pointRows.appendChild(row);
      });
    }

    function render() {
      sortPoints();
      periodInput.value = state.period_s.toFixed(2);
      channels.forEach(drawPlot);
      renderTable();
      jsonOut.textContent = JSON.stringify(profileJson(), null, 2);
    }

    function pointerPos(canvas, event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top,
        width: rect.width,
        height: rect.height,
      };
    }

    function nearestPoint(channel, pos) {
      let best = { index: -1, dist: Infinity };
      state.points.forEach((p, idx) => {
        const dx = timeToX(p.t, pos.width) - pos.x;
        const dy = valueToY(p[channel.key], channel, pos.height) - pos.y;
        const dist = Math.hypot(dx, dy);
        if (dist < best.dist) best = { index: idx, dist };
      });
      return best.dist <= 14 ? best.index : -1;
    }

    function installPlot(channel) {
      const wrap = document.createElement("section");
      wrap.className = "plot";
      wrap.innerHTML = `
        <div class="plot-head">
          <strong>${channel.label}</strong>
          <span>${channel.min}..${channel.max} ${channel.unit}</span>
        </div>
        <canvas aria-label="${channel.label} curve"></canvas>
      `;
      plotRoot.appendChild(wrap);
      const canvas = wrap.querySelector("canvas");
      canvases.set(channel.key, canvas);

      canvas.addEventListener("pointerdown", (event) => {
        canvas.setPointerCapture(event.pointerId);
        const pos = pointerPos(canvas, event);
        let idx = nearestPoint(channel, pos);
        if (idx < 0) {
          const t = xToTime(pos.x, pos.width);
          const value = yToValue(pos.y, channel, pos.height);
          const p = { t, x_m: 0, z_m: 0, amp: 0, wheel_action: 0 };
          for (const ch of channels) {
            p[ch.key] = interpolate(ch.key, t);
          }
          p[channel.key] = value;
          state.points.push(p);
          sortPoints();
          idx = state.points.indexOf(p);
        }
        drag = { channel, index: idx, pointerId: event.pointerId };
        updateDrag(canvas, event);
      });

      canvas.addEventListener("pointermove", (event) => {
        if (!drag || drag.pointerId !== event.pointerId || drag.channel.key !== channel.key) return;
        updateDrag(canvas, event);
      });

      canvas.addEventListener("pointerup", () => {
        drag = null;
      });
      canvas.addEventListener("pointercancel", () => {
        drag = null;
      });
    }

    function interpolate(key, t) {
      sortPoints();
      if (t <= state.points[0].t) return state.points[0][key];
      for (let i = 1; i < state.points.length; i++) {
        const a = state.points[i - 1];
        const b = state.points[i];
        if (t <= b.t) {
          const u = (t - a.t) / Math.max(1e-6, b.t - a.t);
          return a[key] + (b[key] - a[key]) * u;
        }
      }
      return state.points[state.points.length - 1][key];
    }

    function updateDrag(canvas, event) {
      const pos = pointerPos(canvas, event);
      const point = state.points[drag.index];
      const channel = drag.channel;
      const lastIdx = state.points.length - 1;
      if (drag.index !== 0 && drag.index !== lastIdx) {
        const prev = state.points[drag.index - 1].t + 0.01;
        const next = state.points[drag.index + 1].t - 0.01;
        point.t = clamp(round(xToTime(pos.x, pos.width), 4), prev, next);
      }
      point[channel.key] = round(yToValue(pos.y, channel, pos.height), 4);
      render();
    }

    function downloadJson() {
      const blob = new Blob([JSON.stringify(profileJson(), null, 2) + "\n"], {
        type: "application/json",
      });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "ctbc_profile.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function loadJson(file) {
      const reader = new FileReader();
      reader.onload = () => {
        const payload = JSON.parse(String(reader.result));
        if (!Array.isArray(payload.points) || payload.points.length < 2) {
          throw new Error("points must contain at least two entries");
        }
        const period = Number(payload.period_s ?? payload.points[payload.points.length - 1].t);
        state = {
          period_s: period,
          points: payload.points.map((p) => ({
            t: Number(p.t ?? p.time_s),
            x_m: Number(p.x_m ?? p.x ?? 0),
            z_m: Number(p.z_m ?? p.z ?? 0),
            amp: Number(p.amp ?? p.amp_scale ?? 0),
            wheel_action: Number(p.wheel_action ?? p.wheel_action_delta ?? 0),
          })),
        };
        render();
      };
      reader.readAsText(file);
    }

    channels.forEach(installPlot);
    periodInput.addEventListener("change", () => {
      const next = clamp(Number(periodInput.value), 0.1, 2.0);
      state.period_s = round(next, 3);
      state.points[state.points.length - 1].t = state.period_s;
      render();
    });
    document.getElementById("downloadBtn").addEventListener("click", downloadJson);
    document.getElementById("copyBtn").addEventListener("click", async () => {
      await navigator.clipboard.writeText(JSON.stringify(profileJson(), null, 2));
    });
    document.getElementById("resetBtn").addEventListener("click", () => {
      state = { period_s: 0.68, points: defaultPoints.map((p) => ({ ...p })) };
      render();
    });
    document.getElementById("importFile").addEventListener("change", (event) => {
      const file = event.target.files && event.target.files[0];
      if (file) loadJson(file);
      event.target.value = "";
    });
    window.addEventListener("resize", render);
    render();
  </script>
</body>
</html>
