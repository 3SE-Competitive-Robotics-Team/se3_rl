# prek.toml - 提交前钩子配置
# 本仓库只使用本地 hook, 避免额外拉取远端 hook 仓库。
#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "local"
hooks = [
    { id = "ruff-format", name = "ruff format", entry = "uv run ruff format .", language = "system", pass_filenames = false, stages = ["pre-commit"] },
    { id = "ruff-check", name = "ruff check", entry = "uv run ruff check . --fix", language = "system", pass_filenames = false, stages = ["pre-commit"] },
]
